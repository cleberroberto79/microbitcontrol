    <style>
        /* Reset e estrutura base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Cabeçalho */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        h1 {
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .badge {
            background: #ff6d00;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.95rem;
            animation: pulse 2s infinite;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); background: #ff8f00; }
        }

        /* Status Bluetooth */
        .status-area {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            border-left: 5px solid #f44336;
        }

        .status-area.connected {
            border-left-color: #4caf50;
        }

        .status-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #f44336;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .connected .status-indicator {
            background: #4caf50;
            box-shadow: 0 0 15px #4caf50;
        }

        .status-text {
            flex: 1;
            font-weight: 500;
        }

        /* Layout responsivo horizontal */
        .main-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 640px) {
            .main-controls {
                flex-direction: row;
            }
        }

        /* Seções */
        .control-section, .numbers-section {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 18px 12px;
            flex: 1;
        }

        .section-title {
            color: rgba(255,255,255,0.8);
            text-align: center;
            font-size: 1rem;
            margin-bottom: 16px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .keyboard-hint {
            color: #ffb74d;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }

        /* Grade WASD */
        .wasd-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            justify-items: center;
            align-items: center;
            max-width: 260px;
            margin: 0 auto;
        }

        .btn-wasd {
            width: 75px;
            height: 75px;
            border: none;
            border-radius: 18px;
            background: #3949ab;
            box-shadow: 0 6px 0 #1a237e, 0 8px 12px rgba(0,0,0,0.4);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.07s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-wasd:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1a237e, 0 5px 8px rgba(0,0,0,0.4);
            background: #5c6bc0;
        }

        .btn-wasd .key-hint {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 12px;
            margin-top: 4px;
            color: #ffd54f;
        }

        .btn-center {
            background: #FFA000;
            box-shadow: 0 6px 0 #b26500, 0 8px 12px rgba(0,0,0,0.4);
        }

        .btn-center .center-dot {
            font-size: 2.2rem;
            line-height: 1;
        }

        /* Grade Números */
        .num-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .num-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-num {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 16px;
            background: #5e35b1;
            box-shadow: 0 6px 0 #311b92, 0 8px 12px rgba(0,0,0,0.4);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.07s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #311b92, 0 5px 8px rgba(0,0,0,0.4);
            filter: brightness(1.1);
        }

        .btn-num.feedback-sent {
            background-color: #2e7d32 !important;
            box-shadow: 0 6px 0 #1b5e20 !important;
        }

        /* Cores das linhas numéricas */
        .num-row:nth-child(1) .btn-num { background: #2e7d32; box-shadow: 0 6px 0 #1b5e20; }
        .num-row:nth-child(2) .btn-num { background: #ff6f00; box-shadow: 0 6px 0 #b26500; }
        .num-row:nth-child(3) .btn-num { background: #6a1b9a; box-shadow: 0 6px 0 #38006b; }
        #btn-zero { background: #0288d1; box-shadow: 0 6px 0 #01579b; }
        #btn-zero { width: calc(70px * 2 + 10px); }

        /* Botões de ação */
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0 16px;
        }

        .btn-action {
            flex: 1;
            min-width: 110px;
            padding: 14px 10px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .btn-action.connect { background: #4caf50; }
        .btn-action.disconnect { background: #f44336; }
        .btn-action.debug { background: #ff6d00; }

        .btn-action:active { transform: scale(0.96); }

        /* Logs */
        .log-panel {
            background: #0d1424;
            border-radius: 16px;
            padding: 12px;
            max-height: 90px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #00e676;
            border: 1px solid #2a3a5a;
            margin-bottom: 16px;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #1e2a3a;
            display: flex;
            gap: 6px;
        }

        .log-time { color: #ffaa00; }

        /* Rodapé */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .footer .email {
            color: #80deea;
            text-decoration: none;
        }

        /* Ajustes para telas muito pequenas */
        @media (max-width: 400px) {
            .btn-wasd { width: 65px; height: 65px; font-size: 1.8rem; }
            .btn-num { width: 60px; height: 60px; font-size: 1.8rem; }
            #btn-zero { width: calc(60px * 2 + 10px); }
            h1 { font-size: 1.3rem; }
            .badge { font-size: 0.8rem; padding: 4px 10px; }
        }

        /* iOS warning */
        .ios-warning {
            background: #b71c1c;
            color: white;
            padding: 8px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 0.8rem;
            text-align: center;
            display: none;
        }
        .ios-warning.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <div class="header">
            <h1>🎮 Micro:bit Control</h1>
            <div class="badge">Prof. Cleber</div>
        </div>

        <!-- Status Bluetooth -->
        <div class="status-area" id="statusArea">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text" id="statusText">Desconectado</div>
            <div>📶</div>
        </div>

        <!-- Controles principais -->
        <div class="main-controls">
            <!-- WASD -->
            <div class="control-section">
                <div class="section-title">
                    ⏹️ Movimento <span class="keyboard-hint">WASD / Setas</span>
                </div>
                <div class="wasd-grid">
                    <div></div>
                    <button class="btn-wasd" id="btn-up"><span class="arrow-icon">↑</span><span class="key-hint">W</span></button>
                    <div></div>
                    <button class="btn-wasd" id="btn-left"><span class="arrow-icon">←</span><span class="key-hint">A</span></button>
                    <button class="btn-wasd btn-center" id="btn-center"><span class="center-dot">●</span><span class="key-hint">X</span></button>
                    <button class="btn-wasd" id="btn-right"><span class="arrow-icon">→</span><span class="key-hint">D</span></button>
                    <div></div>
                    <button class="btn-wasd" id="btn-down"><span class="arrow-icon">↓</span><span class="key-hint">S</span></button>
                    <div></div>
                </div>
            </div>

            <!-- Números -->
            <div class="numbers-section">
                <div class="section-title">
                    🔢 Números <span class="keyboard-hint">0-9</span>
                </div>
                <div class="num-grid">
                    <div class="num-row">
                        <button class="btn-num" id="btn-7">7</button>
                        <button class="btn-num" id="btn-8">8</button>
                        <button class="btn-num" id="btn-9">9</button>
                    </div>
                    <div class="num-row">
                        <button class="btn-num" id="btn-4">4</button>
                        <button class="btn-num" id="btn-5">5</button>
                        <button class="btn-num" id="btn-6">6</button>
                    </div>
                    <div class="num-row">
                        <button class="btn-num" id="btn-1">1</button>
                        <button class="btn-num" id="btn-2">2</button>
                        <button class="btn-num" id="btn-3">3</button>
                    </div>
                    <div class="num-row">
                        <button class="btn-num" id="btn-zero">0</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botões de ação -->
        <div class="action-buttons">
            <button class="btn-action connect" id="connectBtn">🔗 Conectar</button>
            <button class="btn-action disconnect" id="disconnectBtn" style="display:none;">⛔ Desconectar</button>
            <button class="btn-action debug" id="debugBtn">🐞 Debug</button>
        </div>

        <!-- Logs -->
        <div class="log-panel" id="logPanel">
            <div class="log-entry"><span class="log-time">[Sistema]</span> <span>ℹ️</span> <span>Pronto. Clique em Conectar.</span></div>
        </div>

        <!-- Rodapé -->
        <div class="footer">
            <strong>Professor Cleber</strong> · <a href="mailto:profisicaclebr@gmail.com" class="email">profisicaclebr@gmail.com</a>
        </div>

        <!-- Aviso iOS -->
        <div class="ios-warning" id="iosWarning">⚠️ iOS não suporta Web Bluetooth</div>
    </div>

    <script>
        (function() {
            // ========== CONFIGURAÇÕES BLUETOOTH (NÃO ALTERAR) ==========
            const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
            const UART_TX_CHARACTERISTIC_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
            const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

            // ========== ESTADO ==========
            let bluetoothDevice = null;
            let rxCharacteristic = null;
            let txCharacteristic = null;
            let gattServer = null;
            let commandQueue = Promise.resolve();

            // ========== ELEMENTOS ==========
            const statusArea = document.getElementById('statusArea');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const debugBtn = document.getElementById('debugBtn');
            const logPanel = document.getElementById('logPanel');
            const iosWarning = document.getElementById('iosWarning');

            // ========== MAPA DE TECLAS ==========
            const keyMap = {
                'w': 'btn-up', 'a': 'btn-left', 's': 'btn-down', 'd': 'btn-right',
                'arrowup': 'btn-up', 'arrowdown': 'btn-down', 'arrowleft': 'btn-left', 'arrowright': 'btn-right',
                'x': 'btn-center',
                '0': 'btn-zero', '1': 'btn-1', '2': 'btn-2', '3': 'btn-3', '4': 'btn-4',
                '5': 'btn-5', '6': 'btn-6', '7': 'btn-7', '8': 'btn-8', '9': 'btn-9'
            };

            const commandMap = {
                'btn-up': 'w', 'btn-left': 'a', 'btn-down': 's', 'btn-right': 'd',
                'btn-center': 'x',
                'btn-1': '1', 'btn-2': '2', 'btn-3': '3', 'btn-4': '4', 'btn-5': '5',
                'btn-6': '6', 'btn-7': '7', 'btn-8': '8', 'btn-9': '9', 'btn-zero': '0'
            };

            // ========== LOG ==========
            function addLog(msg, type = 'info') {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const time = new Date();
                const ts = `[${time.getHours()}:${time.getMinutes().toString().padStart(2,'0')}:${time.getSeconds().toString().padStart(2,'0')}]`;
                let icon = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'cmd' ? '📤' : 'ℹ️';
                entry.innerHTML = `<span class="log-time">${ts}</span> <span>${icon}</span> <span>${msg}</span>`;
                logPanel.appendChild(entry);
                logPanel.scrollTop = logPanel.scrollHeight;
                if (logPanel.children.length > 15) logPanel.removeChild(logPanel.firstChild);
            }

            // ========== ENVIO DE COMANDO (ANDROID OK) ==========
            async function sendCommand(cmd, btnId) {
                if (!rxCharacteristic) {
                    addLog('Não conectado', 'error');
                    return;
                }
                // Feedback visual
                const btn = document.getElementById(btnId);
                if (btn) {
                    btn.classList.add('feedback-sent');
                    setTimeout(() => btn.classList.remove('feedback-sent'), 200);
                }

                commandQueue = commandQueue.then(async () => {
                    try {
                        addLog(`Enviando: "${cmd}"`, 'cmd');
                        const bytes = new Uint8Array([...cmd].map(c => c.charCodeAt(0)), 10);
                        await rxCharacteristic.writeValue(bytes);
                    } catch (e) {
                        addLog(`Erro: ${e.message}`, 'error');
                    }
                });
            }

            // ========== EVENTOS DE CLIQUE ==========
            function setupButtons() {
                for (const [btnId, cmd] of Object.entries(commandMap)) {
                    const btn = document.getElementById(btnId);
                    if (btn) {
                        btn.addEventListener('click', () => sendCommand(cmd, btnId));
                    }
                }
            }

            // ========== TECLADO ==========
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                const key = e.key.toLowerCase();
                const btnId = keyMap[key];
                if (btnId) {
                    e.preventDefault();
                    const cmd = commandMap[btnId];
                    if (cmd) sendCommand(cmd, btnId);
                }
            });

            // ========== BLUETOOTH ==========
            async function connect() {
                try {
                    addLog('Procurando micro:bit...');
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: "BBC micro:bit" }],
                        optionalServices: [UART_SERVICE_UUID]
                    });
                    addLog(`Encontrado: ${device.name}`, 'success');

                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService(UART_SERVICE_UUID);

                    // TX primeiro (notificações)
                    const tx = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);
                    await tx.startNotifications();
                    tx.addEventListener('characteristicvaluechanged', (e) => {
                        const val = e.target.value;
                        if (val) {
                            const txt = new TextDecoder().decode(val);
                            addLog(`Recebido: ${txt}`, 'info');
                        }
                    });

                    // RX depois
                    const rx = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
                    
                    // Aquecimento Android
                    await rx.writeValue(new Uint8Array([10]));

                    // Salvar
                    bluetoothDevice = device;
                    gattServer = server;
                    txCharacteristic = tx;
                    rxCharacteristic = rx;

                    statusArea.classList.add('connected');
                    statusText.innerText = 'Conectado';
                    connectBtn.style.display = 'none';
                    disconnectBtn.style.display = 'flex';
                    addLog('✅ Conectado!', 'success');

                } catch (err) {
                    addLog(`Falha: ${err.message}`, 'error');
                }
            }

            function disconnect() {
                if (gattServer?.connected) gattServer.disconnect();
                bluetoothDevice = null;
                gattServer = null;
                rxCharacteristic = null;
                txCharacteristic = null;
                statusArea.classList.remove('connected');
                statusText.innerText = 'Desconectado';
                connectBtn.style.display = 'flex';
                disconnectBtn.style.display = 'none';
                addLog('Desconectado', 'warning');
            }

            function debug() {
                addLog('=== DEBUG ===', 'info');
                addLog(`WebBT: ${'bluetooth' in navigator ? 'sim' : 'não'}`, 'info');
                addLog(`Conectado: ${!!rxCharacteristic}`, 'info');
                addLog(`UA: ${navigator.userAgent.substring(0,50)}...`, 'info');
            }

            // ========== INICIALIZAÇÃO ==========
            setupButtons();
            connectBtn.addEventListener('click', connect);
            disconnectBtn.addEventListener('click', disconnect);
            debugBtn.addEventListener('click', debug);

            // iOS warning
            if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream) {
                iosWarning.classList.add('show');
            }

            // Wake lock (opcional, não crítico)
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        })();
    </script>
</body>
</html>
