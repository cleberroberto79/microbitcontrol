<script>
(function() {
    // ========== CONFIGURAÇÕES BLUETOOTH (NÃO ALTERAR) ==========
    const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const UART_TX_CHARACTERISTIC_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    // ========== ESTADO ==========
    let bluetoothDevice = null;
    let rxCharacteristic = null;
    let gattServer = null;
    let commandQueue = Promise.resolve(); // Fila para evitar sobrecarga

    // ========== ELEMENTOS ==========
    const statusArea = document.getElementById('statusArea');
    const statusText = document.getElementById('statusText');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const debugBtn = document.getElementById('debugBtn');
    const logPanel = document.getElementById('logPanel');
    const iosWarning = document.getElementById('iosWarning');

    // ========== MAPA DE TECLAS E COMANDOS ==========
    const keyMap = {
        'w': 'btn-up', 'a': 'btn-left', 's': 'btn-down', 'd': 'btn-right',
        'arrowup': 'btn-up', 'arrowdown': 'btn-down', 'arrowleft': 'btn-left', 'arrowright': 'btn-right',
        'x': 'btn-center',
        '0': 'btn-zero', '1': 'btn-1', '2': 'btn-2', '3': 'btn-3', '4': 'btn-4',
        '5': 'btn-5', '6': 'btn-6', '7': 'btn-7', '8': 'btn-8', '9': 'btn-9'
    };

    const commandMap = {
        'btn-up': 'w', 'btn-left': 'a', 'btn-down': 's', 'btn-right': 'd',
        'btn-center': 'x',
        'btn-1': '1', 'btn-2': '2', 'btn-3': '3', 'btn-4': '4', 'btn-5': '5',
        'btn-6': '6', 'btn-7': '7', 'btn-8': '8', 'btn-9': '9', 'btn-zero': '0'
    };

    // ========== FUNÇÃO DE LOG ==========
    function addLog(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        
        let icon = 'ℹ️';
        if (type === 'success') icon = '✅';
        else if (type === 'error') icon = '❌';
        else if (type === 'warning') icon = '⚠️';
        else if (type === 'command') icon = '📤';
        
        entry.innerHTML = `<span class="log-time">${timeStr}</span> <span>${icon}</span> <span>${message}</span>`;
        logPanel.appendChild(entry);
        logPanel.scrollTop = logPanel.scrollHeight;
        
        // Limitar número de logs
        while (logPanel.children.length > 12) {
            logPanel.removeChild(logPanel.firstChild);
        }
    }

    // ========== FUNÇÃO DE ENVIO CORRIGIDA (CRÍTICO PARA O MICRO:BIT) ==========
    async function sendCommand(cmd, btnId) {
        // 1. Verifica se está conectado
        if (!rxCharacteristic) {
            addLog('Não conectado. Clique em Conectar.', 'error');
            return;
        }

        // 2. Feedback visual no botão
        const btn = document.getElementById(btnId);
        if (btn) {
            btn.classList.add('feedback-sent');
            setTimeout(() => btn.classList.remove('feedback-sent'), 200);
        }

        // 3. Adiciona à fila e envia (CORRIGIDO)
        commandQueue = commandQueue.then(async () => {
            try {
                addLog(`Enviando: "${cmd}"`, 'command');
                
                // --- CORREÇÃO AQUI ---
                // 1. Converte a string do comando para um array de bytes
                const bytes = [];
                for (let i = 0; i < cmd.length; i++) {
                    bytes.push(cmd.charCodeAt(i));
                }
                // 2. Adiciona o caractere de nova linha (\n) que o micro:bit espera
                bytes.push(10); // 10 é o código ASCII para Line Feed (\n)
                
                // 3. Cria o Uint8Array a partir do array de bytes
                const data = new Uint8Array(bytes);
                // --- FIM DA CORREÇÃO ---
                
                // 4. Envia para o micro:bit
                await rxCharacteristic.writeValue(data);
                
            } catch (error) {
                addLog(`Erro no envio: ${error.message}`, 'error');
                // Se houver erro, talvez a conexão tenha caído
                if (error.message.includes('GATT') || error.message.includes('disconnected')) {
                    disconnectFromMicrobit();
                }
            }
        });
    }

    // ========== CONFIGURAÇÃO DOS BOTÕES ==========
    function setupButtons() {
        for (const [btnId, cmd] of Object.entries(commandMap)) {
            const btn = document.getElementById(btnId);
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    sendCommand(cmd, btnId);
                });
            }
        }
    }

    // ========== CONFIGURAÇÃO DO TECLADO ==========
    document.addEventListener('keydown', (e) => {
        // Ignorar se estiver digitando em um campo de texto (não há, mas por segurança)
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            return;
        }
        
        const key = e.key.toLowerCase();
        const btnId = keyMap[key];
        
        if (btnId) {
            e.preventDefault(); // Previne rolagem da página com as setas
            const cmd = commandMap[btnId];
            if (cmd) {
                sendCommand(cmd, btnId);
            }
        }
    });

    // ========== FUNÇÃO DE CONEXÃO BLUETOOTH ==========
    async function connectToMicrobit() {
        try {
            addLog('Procurando micro:bit...', 'info');
            
            // Passo 1: Solicitar dispositivo
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: "BBC micro:bit" }],
                optionalServices: [UART_SERVICE_UUID]
            });
            
            addLog(`Encontrado: ${device.name}`, 'success');
            
            // Passo 2: Conectar ao GATT Server
            const server = await device.gatt.connect();
            
            // Passo 3: Obter o serviço UART
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            
            // Passo 4: Obter a característica TX e ativar notificações (ORDEM CRÍTICA)
            const txCharacteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);
            await txCharacteristic.startNotifications();
            
            // Opcional: Ouvir dados vindos do micro:bit
            txCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                const value = event.target.value;
                if (value) {
                    // Tenta decodificar a mensagem recebida
                    try {
                        const decoder = new TextDecoder('utf-8');
                        const received = decoder.decode(value);
                        addLog(`Recebido: ${received}`, 'info');
                    } catch (e) {
                        // Ignora erros de decodificação
                    }
                }
            });
            
            // Passo 5: Obter a característica RX (para enviar comandos)
            const rxCharacteristicTemp = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
            
            // Passo 6: **AQUECIMENTO** - Enviar um byte nulo para ativar a comunicação no Android
            await rxCharacteristicTemp.writeValue(new Uint8Array([10])); // Envia \n
            addLog('Byte de aquecimento enviado', 'success');
            
            // Salvar as referências
            bluetoothDevice = device;
            gattServer = server;
            rxCharacteristic = rxCharacteristicTemp;
            
            // Atualizar UI
            statusArea.classList.add('connected');
            statusText.innerText = 'Conectado';
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'flex';
            
            addLog('✅ Conectado! Pronto para enviar comandos.', 'success');
            
            // Tratar desconexão inesperada
            device.addEventListener('gattserverdisconnected', () => {
                disconnectFromMicrobit();
                addLog('Conexão perdida com o micro:bit', 'warning');
            });
            
        } catch (error) {
            addLog(`Falha na conexão: ${error.message}`, 'error');
            disconnectFromMicrobit(); // Limpa o estado em caso de erro
        }
    }

    // ========== FUNÇÃO DE DESCONEXÃO ==========
    function disconnectFromMicrobit() {
        if (gattServer && gattServer.connected) {
            try {
                gattServer.disconnect();
            } catch (e) {
                // Ignora erros de desconexão
            }
        }
        
        // Limpar referências
        bluetoothDevice = null;
        gattServer = null;
        rxCharacteristic = null;
        
        // Atualizar UI
        statusArea.classList.remove('connected');
        statusText.innerText = 'Desconectado';
        connectBtn.style.display = 'flex';
        disconnectBtn.style.display = 'none';
        
        addLog('Desconectado.', 'warning');
        
        // Limpar a fila de comandos para não enviar comandos antigos se reconectar
        commandQueue = Promise.resolve();
    }

    // ========== FUNÇÃO DE DEBUG ==========
    function debugAndroid() {
        addLog('=== DEBUG ===', 'info');
        addLog(`User Agent: ${navigator.userAgent}`, 'info');
        addLog(`Web Bluetooth: ${'bluetooth' in navigator ? '✅ Sim' : '❌ Não'}`, 'info');
        addLog(`Wake Lock: ${'wakeLock' in navigator ? '✅ Sim' : '❌ Não'}`, 'info');
        
        if (bluetoothDevice) {
            addLog(`Dispositivo: ${bluetoothDevice.name}`, 'info');
            addLog(`Conectado: ${gattServer && gattServer.connected ? '✅ Sim' : '❌ Não'}`, 'info');
            addLog(`Característica RX: ${rxCharacteristic ? '✅ Ok' : '❌ Não'}`, 'info');
        } else {
            addLog('Nenhum dispositivo conectado', 'warning');
        }
    }

    // ========== INICIALIZAÇÃO ==========
    // Configurar eventos dos botões
    setupButtons();
    
    // Configurar botões de ação
    connectBtn.addEventListener('click', connectToMicrobit);
    disconnectBtn.addEventListener('click', disconnectFromMicrobit);
    debugBtn.addEventListener('click', debugAndroid);

    // Detectar iOS e mostrar aviso
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
        iosWarning.classList.add('show');
        addLog('iOS detectado: Web Bluetooth não é suportado.', 'error');
    } else {
        // Tentar ativar o Wake Lock para Android (mantém tela ligada)
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => {
                // Falha no wake lock não é crítica
            });
        }
    }

    // Log inicial
    addLog('Página carregada. Clique em Conectar.', 'info');
})();
</script>
