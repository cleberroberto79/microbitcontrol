            border-radius: 20px;
            display: inline-block;
        }

        .wasd-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);

            justify-items: center;
            align-items: center;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            flex: 1;

        .btn-wasd {

            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
            position: relative;
        }

        .btn-wasd:active, .btn-wasd.key-press {
            transform: translateY(6px);
            box-shadow: 0 0 0 #1a237e, 0 5px 8px rgba(0,0,0,0.3);
            background: #5c6bc0;
        }

        .btn-wasd .key-hint {
            font-size: 0.7rem;

            background: rgba(255,255,255,0.2);

            border-radius: 8px;
            margin-top: 2px;
            color: #ffd54f;
        }

            font-size: clamp(1.8rem, 6vw, 2.8rem);
            line-height: 1;
        }

        .btn-center {
            background: #FFA000;
            box-shadow: 0 6px 0 #b26500, 0 8px 12px rgba(0,0,0,0.3);
        }

        .btn-center .center-dot {
            font-size: clamp(2rem, 7vw, 3rem);
            line-height: 1;
        }

        /* ===== SEÇÃO NUMÉRICA ===== */

            background: rgba(0,0,0,0.2);

            padding: 15px 10px;

            display: flex;
            flex-direction: column;

            border-bottom: 2px solid rgba(255,255,255,0.2);

                border-bottom: none;

        .num-row:nth-child(2) .btn-num { background: #ff6f00; box-shadow: 0 6px 0 #b26500; }
        .num-row:nth-child(3) .btn-num { background: #6a1b9a; box-shadow: 0 6px 0 #38006b; }
        #btn-zero { background: #0288d1; box-shadow: 0 6px 0 #01579b; }

        /* ===== BOTÕES DE AÇÃO ===== */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
            flex-shrink: 0;
        }

        .btn-action {
            flex: 1;

            padding: 12px 8px;
            border: none;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: bold;

            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);

        .btn-action.connect { background: #4caf50; }
        .btn-action.disconnect { background: #f44336; }
        .btn-action.debug { background: #ff6d00; }

        .log-panel {

    <div class="container">

                        <span class="key-hint">A</span>

                        <span class="key-hint">D</span>
                    </button>

                        <span class="arrow-icon">↓</span>
                        <span class="key-hint">S</span>

                '8': { buttonId: 'btn-8', command: '8' },
                '9': { buttonId: 'btn-9', command: '9' }
            };

            // ===== FUNÇÕES DE LOG =====
            function addLog(message, type = 'info') {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const now = new Date();
                const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
                
                let icon = 'ℹ️';
                if (type === 'success') icon = '✅';
                if (type === 'error') icon = '❌';
                if (type === 'warning') icon = '⚠️';
                if (type === 'command') icon = '📤';
                if (type === 'keyboard') icon = '⌨️';
                
                entry.innerHTML = `<span class="log-time">${timeStr}</span> <span class="log-icon">${icon}</span> <span class="log-msg">${message}</span>`;
                logPanel.appendChild(entry);
                logPanel.scrollTop = logPanel.scrollHeight;
                
                while (logPanel.children.length > 20) {
                    logPanel.removeChild(logPanel.firstChild);
                }
            }

            // ===== FUNÇÃO DE ENVIO (CRÍTICA PARA ANDROID) =====
            function sendCommand(command, source = 'botão') {
                return new Promise((resolve, reject) => {
                    if (!rxCharacteristic) {
                        addLog('❌ Não conectado. Clique em Conectar primeiro.', 'error');
                        return reject('Não conectado');
                    }

                    commandQueue = commandQueue.then(() => {
                        return (async () => {
                            try {
                                addLog(`📤 Enviando: "${command}" (${source})`, 'command');
                                
                                // ANDROID: NUNCA usar TextEncoder
                                const bytes = [];
                                for (let i = 0; i < command.length; i++) {
                                    bytes.push(command.charCodeAt(i));
                                }
                                bytes.push(10); // newline (\n)
                                const data = new Uint8Array(bytes);
                                
                                await rxCharacteristic.writeValue(data);
                                return resolve();
                            } catch (error) {
                                addLog(`❌ Erro: ${error.message}`, 'error');
                                return reject(error);
                            }
                        })();
                    });

                    commandQueue = commandQueue.catch(err => {
                        addLog(`⚠️ Fila: ${err.message}`, 'error');
                    });
                });
            }

            // ===== SIMULAR PRESSIONAMENTO =====
            function simulateButtonPress(buttonId) {
                const button = document.getElementById(buttonId);
                if (!button) return;
                
                button.classList.add('key-press');
                setTimeout(() => {
                    button.classList.remove('key-press');
                }, 100);
                
                button.classList.add('feedback-sent');
                setTimeout(() => {
                    button.classList.remove('feedback-sent');
                }, 200);
            }

            // ===== EVENTOS DE TECLADO =====
            function setupKeyboardEvents() {
                document.addEventListener('keydown', (event) => {
                    if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
                        return;
                    }
                    
                    const key = event.key.toLowerCase();
                    
                    let mappedKey = key;
                    if (key.startsWith('arrow')) {
                        mappedKey = key;
                    }
                    
                    if (keyMap.hasOwnProperty(mappedKey)) {
                        event.preventDefault();
                        
                        const mapping = keyMap[mappedKey];
                        simulateButtonPress(mapping.buttonId);
                        sendCommand(mapping.command, 'teclado').catch(err => {});
                        
                        let displayKey = key;
                        if (key === 'arrowup') displayKey = '↑';
                        else if (key === 'arrowdown') displayKey = '↓';
                        else if (key === 'arrowleft') displayKey = '←';
                        else if (key === 'arrowright') displayKey = '→';
                        else displayKey = key.toUpperCase();
                        
                        addLog(`⌨️ Tecla: ${displayKey} → "${mapping.command}"`, 'keyboard');
                    }
                });
            }

            // ===== EVENTOS DOS BOTÕES =====
            function setupButtonEvents() {
                const buttons = [
                    'up', 'left', 'down', 'right', 'center',
                    '1', '2', '3', '4', '5', '6', '7', '8', '9', 'zero'
                ];
                
                buttons.forEach(id => {
                    const element = document.getElementById(`btn-${id}`);
                    if (element) {
                        element.addEventListener('click', () => {
                            let command = id;
                            if (id === 'up') command = 'w';
                            else if (id === 'left') command = 'a';
                            else if (id === 'down') command = 's';
                            else if (id === 'right') command = 'd';
                            else if (id === 'center') command = 'x';
                            else if (id === 'zero') command = '0';
                            
                            sendCommand(command, 'botão');
                            simulateButtonPress(`btn-${id}`);
                        });
                    }
                });
            }

            // ===== CONEXÃO BLUETOOTH =====
            async function connectToMicrobit() {
                try {
                    addLog('🔍 Procurando micro:bit...', 'info');
                    
                    bluetoothDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: "BBC micro:bit" }],
                        optionalServices: [UART_SERVICE_UUID]
                    });

                    addLog(`✅ Encontrado: ${bluetoothDevice.name}`, 'success');
                    
                    const timeout = /android/i.test(navigator.userAgent) ? 10000 : 5000;
                    gattServer = await bluetoothDevice.gatt.connect();
                    
                    const service = await gattServer.getPrimaryService(UART_SERVICE_UUID);
                    
                    txCharacteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);
                    await txCharacteristic.startNotifications();
                    
                    txCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        const decoder = new TextDecoder('utf-8');
                        const received = decoder.decode(value);
                        addLog(`📥 Recebido: ${received}`, 'info');
                    });
                    
                    rxCharacteristic = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
                    
                    const warmBytes = new Uint8Array([10]);
                    await rxCharacteristic.writeValue(warmBytes);
                    addLog('🔥 Byte de aquecimento enviado', 'success');
                    
                    statusArea.classList.add('connected');
                    statusText.innerText = 'Conectado';
                    connectBtn.style.display = 'none';
                    disconnectBtn.style.display = 'flex';
                    
                    addLog('✅ Conectado! Pronto para enviar comandos.', 'success');
                    
                } catch (error) {
                    addLog(`❌ Erro: ${error.message}`, 'error');
                    disconnectFromMicrobit();
                }
            }

            function disconnectFromMicrobit() {
                if (gattServer && gattServer.connected) {
                    gattServer.disconnect();
                }
                bluetoothDevice = null;
                rxCharacteristic = null;
                txCharacteristic = null;
                gattServer = null;
                
                statusArea.classList.remove('connected');
                statusText.innerText = 'Desconectado';
                connectBtn.style.display = 'flex';
                disconnectBtn.style.display = 'none';
                addLog('👋 Desconectado.', 'warning');
            }

            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                        addLog('⚡ Tela sempre ativa', 'success');
                        
                        wakeLock.addEventListener('release', () => {
                            addLog('💤 Wake Lock liberado', 'info');
                        });
                    }
                } catch (err) {
                    addLog(`⚠️ Wake Lock: ${err.message}`, 'warning');
                }
            }

            function debugAndroid() {
                addLog('🔧 DEBUG ANDROID', 'info');
                addLog(`UA: ${navigator.userAgent}`, 'info');
                addLog(`Web Bluetooth: ${'bluetooth' in navigator ? 'Sim' : 'Não'}`, 'info');
                
                if (bluetoothDevice) {
                    addLog(`Dispositivo: ${bluetoothDevice.name}`, 'info');
                    addLog(`Conectado: ${gattServer && gattServer.connected ? 'Sim' : 'Não'}`, 'info');
                } else {
                    addLog('Nenhum dispositivo conectado', 'warning');
                }
            }

            // ===== FUNÇÃO DE TELA CHEIA =====
            function toggleFullScreen() {
                if (!document.fullscreenElement) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    } else if (document.documentElement.msRequestFullscreen) {
                        document.documentElement.msRequestFullscreen();
                    }
                    fullscreenBtn.textContent = '✕';
                    fullscreenBtn.title = 'Sair da Tela Cheia';
                    addLog('⛶ Modo tela cheia ativado', 'success');
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                    fullscreenBtn.textContent = '⛶';
                    fullscreenBtn.title = 'Tela Cheia';
                    addLog('⛶ Modo tela cheia desativado', 'info');
                }
            }

            function updateFullscreenButton() {
                if (document.fullscreenElement) {
                    fullscreenBtn.textContent = '✕';
                    fullscreenBtn.title = 'Sair da Tela Cheia';
                } else {
                    fullscreenBtn.textContent = '⛶';
                    fullscreenBtn.title = 'Tela Cheia';
                }
            }

            // ===== INICIALIZAÇÃO =====
            window.addEventListener('load', () => {
                setupButtonEvents();
                setupKeyboardEvents();
                
                connectBtn.addEventListener('click', async () => {
                    await requestWakeLock();
                    await connectToMicrobit();
                });
                
                disconnectBtn.addEventListener('click', disconnectFromMicrobit);
                debugBtn.addEventListener('click', debugAndroid);
                fullscreenBtn.addEventListener('click', toggleFullScreen);
                
                document.addEventListener('fullscreenchange', updateFullscreenButton);
                document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
                document.addEventListener('mozfullscreenchange', updateFullscreenButton);
                document.addEventListener('MSFullscreenChange', updateFullscreenButton);
                
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                if (isIOS) {
                    addLog('⚠️ iOS: Web Bluetooth não suportado', 'error');
                }
            });

            document.addEventListener('visibilitychange', async () => {
                if (wakeLock && document.visibilityState === 'visible') {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            });

        })();
    </script>
</body>
</html>
